<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.18), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255,255,255,0.12), transparent 25%),
        linear-gradient(135deg, #0f172a, #1e3a8a, #7c3aed, #ec4899);
      background-size: 120% 120%;
      animation: bgShift 10s ease-in-out infinite alternate;
    }

    .glow {
      position: absolute;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      filter: blur(60px);
      animation: floatGlow 8s ease-in-out infinite;
    }

    .hello {
      position: relative;
      z-index: 1;
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      text-align: center;
      text-shadow:
        0 0 10px rgba(255,255,255,0.8),
        0 0 20px rgba(255,255,255,0.6),
        0 0 40px rgba(168,85,247,0.8),
        0 0 80px rgba(236,72,153,0.6);
      animation: pulse 2.8s ease-in-out infinite;
      user-select: none;
    }

    .hello::after {
      content: "HELLO WORLD";
      position: absolute;
      inset: 0;
      z-index: -1;
      transform: translateY(12px) scale(1.03);
      color: rgba(255,255,255,0.08);
      filter: blur(10px);
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    @keyframes floatGlow {
      0%, 100% { transform: translate(-40px, -30px) scale(1); }
      50% { transform: translate(40px, 30px) scale(1.15); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="hello">Hello World</div>
</body>
</html>
